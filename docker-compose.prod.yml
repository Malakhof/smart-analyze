services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-analyze-db
    environment:
      POSTGRES_USER: smartanalyze
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
      POSTGRES_DB: smartanalyze
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: smart-analyze-app
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://smartanalyze:${DB_PASSWORD:-strongpassword}@smart-analyze-db:5432/smartanalyze
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - WHISPER_API_KEY=${WHISPER_API_KEY}
      - WHISPER_API_URL=${WHISPER_API_URL}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-1}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
